id = "thkt.agentchat"
name = "Agent Chat"
version = "0.7.0"
min_herdr_version = "0.7.0"
description = "leader/coder two-agent conversation: send-and-wake via agent prompt --wait"
platforms = ["macos"]

[[actions]]
id = "list"
title = "List agents"
contexts = ["workspace"]
command = ["bash", "actions/list.sh"]

[[actions]]
id = "setup"
title = "Setup leader + coder (one shot)"
contexts = ["workspace"]
command = ["bash", "actions/setup.sh"]

[[actions]]
id = "start-leader"
title = "Start leader (claude)"
contexts = ["workspace"]
command = ["bash", "actions/start-leader.sh"]

[[actions]]
id = "start-coder"
title = "Start coder (codex)"
contexts = ["workspace"]
command = ["bash", "actions/start-coder.sh"]

[[actions]]
id = "verify-link"
title = "Brief leader and confirm start"
contexts = ["workspace"]
command = ["bash", "actions/verify-link.sh"]

# Observation must not prompt because an event hook that wakes agents can loop.
[[events]]
on = "pane.agent_status_changed"
command = ["bash", "events/log-status.sh"]

# Marker gating limits relay to one delivery and prevents wake loops.
[[events]]
on = "pane.agent_status_changed"
command = ["bash", "events/relay.sh"]
