id = "thkt.agentchat"
name = "Agent Chat"
version = "0.4.1"
min_herdr_version = "0.7.0"
description = "leader/coder two-agent conversation: send-and-wake via agent prompt --wait"
platforms = ["macos"]

[[actions]]
id = "list"
title = "List agents"
contexts = ["workspace"]
command = ["bash", "actions/list.sh"]

[[actions]]
id = "start-leader"
title = "Start leader (claude)"
contexts = ["workspace"]
command = ["bash", "actions/start-leader.sh"]

[[actions]]
id = "start-coder"
title = "Start coder (codex)"
contexts = ["workspace"]
command = ["bash", "actions/start-coder.sh"]

[[actions]]
id = "verify-link"
title = "Verify leader/coder link"
contexts = ["workspace"]
command = ["bash", "actions/verify-link.sh"]

# T2: observation log. This hook never sends prompts.
[[events]]
on = "pane.agent_status_changed"
command = ["bash", "events/log-status.sh"]

# Completion relay: delivers a finished turn to the pending sender.
# One relay per send (marker-gated), so it cannot become a wake loop.
[[events]]
on = "pane.agent_status_changed"
command = ["bash", "events/relay.sh"]
